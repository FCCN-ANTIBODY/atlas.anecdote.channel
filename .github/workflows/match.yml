name: match

# Run the matchmaker over the needs Atlas carries and publish matches.json. For each
# need (_data/needs.yml), test candidate piles in the same scope for constitutional fit
# (honest needs-judgment by default), accept matches into matches.json; the asker PULLS
# it. No write into any asker — routing a match home is the asker's own pull + re-issue.
#
# The work itself is the reusable `match` composite action (.github/actions/match),
# which a workspace that mounts atlas at atlas/ can `uses: ./atlas/.github/actions/match`
# to run over its OWN needs/piles/tells. This workflow just dogfoods it on Atlas's own
# directory; the hourly cron below is Atlas's cadence — an adopter picks its own.

on:
  schedule:
    - cron: "41 * * * *" # hourly, best-effort
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: match
  cancel-in-progress: false

jobs:
  match:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/match
