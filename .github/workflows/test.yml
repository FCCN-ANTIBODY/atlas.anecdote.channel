name: "Test · core"

# Smoke-test the matchmaker (bin/match), the widget locator baker (bin/widget), and the
# hub-fill scan router (assets/scan.js). The site templates are covered by the build job;
# this guards the request-for-pile logic and the baked-QR identity/state-routing layer.

on:
  push:
    paths:
      - "bin/match"
      - "bin/gate"
      - "bin/widget"
      - "bin/drop"
      - "bin/drop.mjs"
      - "bin/custody"
      - "bin/custody.mjs"
      - "assets/scan.js"
      - "workers/scan-router/worker.js"
      - "_data/needs.yml"
      - "test/**"
      - ".github/workflows/test.yml"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke tests (matchmaker + widget + scan router)
        run: test/run.sh   # ruby (stdlib) + jq + node are preinstalled on the runner
      - name: Gate transport (bin/gate, stub engine — no anecdote checkout)
        run: test/gate.test.sh
