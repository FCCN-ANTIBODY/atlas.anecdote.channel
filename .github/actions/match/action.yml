name: "Atlas match"
description: >-
  Run the Atlas matchmaker over a directory's needs and publish matches.json. For
  each need (needs registry) it tests candidate piles in the same scope for
  constitutional fit (bin/match — pluggable via match-cmd; honest needs-judgment by
  default), then commits the accepted matches to the output file if it changed. The
  asker PULLS that file; Atlas never writes into an asker.

  This is the reusable form of atlas's own match.yml: a workspace that mounts atlas at
  atlas/ can `uses: ./atlas/.github/actions/match` to run the same matchmaker over its
  OWN needs/piles/tells instead of atlas's. Needs only contents:write on the calling
  repo (the built-in GITHUB_TOKEN).

inputs:
  needs:
    description: "Path to the needs registry in the calling repo."
    required: false
    default: "_data/needs.yml"
  piles:
    description: "Path to the pile registry in the calling repo."
    required: false
    default: "_data/piles.yml"
  tells:
    description: "Path to the tell directory in the calling repo."
    required: false
    default: "_data/tells.yml"
  config:
    description: "Path to the Jekyll config (read for the atlas url)."
    required: false
    default: "_config.yml"
  output:
    description: "Path the accepted matches are written to."
    required: false
    default: "matches.json"
  match-cmd:
    description: >-
      Command reading {need,candidate} JSON on stdin -> {verdict,reason}. Blank => the
      honest default (needs-judgment), so nothing auto-matches without a real judge.
    required: false
    default: ""
  publish:
    description: "Commit + push the output file when it changes."
    required: false
    default: "true"
  git-user-name:
    description: "Commit author name used when publishing."
    required: false
    default: "atlas-match"
  git-user-email:
    description: "Commit author email used when publishing."
    required: false
    default: "atlas-match@users.noreply.github.com"

runs:
  using: "composite"
  steps:
    - name: Run the matchmaker
      shell: bash
      # The matchmaker logic is the committed bin/match (ruby stdlib yaml/json + jq,
      # both present on the runner); this action just points it at the caller's data.
      env:
        ATLAS_NEEDS: ${{ inputs.needs }}
        ATLAS_PILES: ${{ inputs.piles }}
        ATLAS_TELLS: ${{ inputs.tells }}
        ATLAS_CONFIG: ${{ inputs.config }}
        ATLAS_OUT: ${{ inputs.output }}
        ATLAS_MATCH_CMD: ${{ inputs.match-cmd }}
      run: "$GITHUB_ACTION_PATH/../../../bin/match"

    - name: Publish matches if they changed
      if: ${{ inputs.publish == 'true' }}
      shell: bash
      env:
        OUTPUT: ${{ inputs.output }}
        GIT_USER_NAME: ${{ inputs.git-user-name }}
        GIT_USER_EMAIL: ${{ inputs.git-user-email }}
      run: |
        set -euo pipefail
        if git diff --quiet -- "$OUTPUT"; then echo "no match changes"; exit 0; fi
        git config user.name  "$GIT_USER_NAME"
        git config user.email "$GIT_USER_EMAIL"
        git add "$OUTPUT"
        git commit -m "match: refresh published matches"
        git push
