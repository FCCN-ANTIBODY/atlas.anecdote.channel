title: Atlas
description: >-
  A reflection API that browses moderated snapshots ("maps") published by
  anecdote.channel data-piles.
url: "https://atlas.anecdote.channel"
baseurl: ""

# Custom build: we run `jekyll build` ourselves in Actions, so we are free to
# enable any plugins (the reflection generator in _plugins/ loads automatically).
plugins: []

# Docs are notes, not site pages. The sample map under samples/ IS served so the
# runtime client can fall back to it offline / before a live sink exists.
exclude:
  - CONTRACT.md
  - DNS.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - bin/
  - vendor/

# Pretty URLs (/foo/ instead of /foo.html).
permalink: pretty
