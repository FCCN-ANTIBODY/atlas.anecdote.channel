<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/atlas.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <span class="site-tag">directory of Tells</span>
    <nav class="site-nav"><a href="{{ '/tells/' | relative_url }}">Tells</a> · <a href="{{ '/needs/' | relative_url }}">What's hanging</a></nav>
  </header>
  <main>
    {{ content }}
  </main>
  <footer class="site-footer">
    <p>Atlas lists the Tells that front anecdote.channel data-piles, and reflects the coarse maps the piles behind them place here.</p>
  </footer>
</body>
</html>
