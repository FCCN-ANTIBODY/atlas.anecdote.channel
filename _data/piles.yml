# Registry of data-piles Atlas reflects — and the trust anchor for the public map.
#
# At build time this becomes piles.json (the manifest the runtime client + the
# gateway Worker read). No data is fetched at build time, so updating a pile's
# data never rebuilds the site.
#
# Atlas is an INDEX + reflecting GATEWAY: it only ever serves a pile's coarse public
# map from its OWN domain, never by reaching into a pile's repo. Each pile owns a
# self-named, prefixed BRANCH in this repo (a non-merging parallel namespace) and
# places its map by pushing SIGNED commits to that branch only — see CONTRACT.md.
# This registry declares which branch + signer is legitimate for each slice.
#
# Inbound (responses → encrypted digests → pile) is NOT Atlas's job — it belongs to
# the pile's Tell (see _data/tells.yml and tell.anecdote.channel). A pile is reached
# through its Tell; Atlas only lists and reflects.
#
# Each entry needs:
#   id:     stable slug, also the served path segment
#   name:   human-readable label
#   level:  region tier (district | city | county | … ) — carried for aggregators
#   scope:  region/namespace tier; the <scope> segment of the branch ref
#   map:    the stable Atlas-hosted path the gateway serves this slice at. A
#           committed seed lives here so the slice renders before first placement.
#   branch: the pile's own ref the gateway reads live map data from
#           (convention pile/<scope>/<id>); the pile pushes signed commits here.
#   signer: the key fingerprint Atlas expects to have signed this branch's commits —
#           the documented/audit anchor for map custody.
- id: cd04-q1
  name: "Colorado House District 4 — Question 1"
  level: district
  scope: "colorado"
  map: "/piles/cd04-q1/map.xml"
  branch: "pile/colorado/cd04-q1"
  signer: "SHA256:PLACEHOLDER-cd04-q1-ssh-key-fingerprint"
