# Registry of data-piles Atlas reflects.
#
# At build time this becomes piles.json (the manifest the runtime client reads);
# the client fetches each map per-slice in the browser. No data is fetched at
# build time, so updating a pile's data never rebuilds the site.
#
# Atlas is a GATEWAY: it only ever serves pile data from its OWN domain, never by
# reaching into a pile's repo. A consenting pile places its artifact onto Atlas
# (see CONTRACT.md "Gateway placement"); Atlas serves it at a stable path which
# both this runtime client and downstream aggregators read.
#
# Each entry needs:
#   id:    stable slug, also the placement path segment
#   name:  human-readable label
#   level: region tier (district | city | county | … ) — carried for aggregators
#   map:   the Atlas-hosted path where the gateway places this pile's artifact.
#          A committed seed lives at this path so the slice renders before (or
#          without) live placement; production placement overrides it out-of-band.
- id: cd04-q1
  name: "Colorado House District 4 — Question 1"
  level: district
  map: "/piles/cd04-q1/map.xml"
